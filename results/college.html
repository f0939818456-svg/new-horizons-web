<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>大學申請榜 | New Horizons Education</title>
    <meta name="description" content="New Horizons 大學申請榜：以申請季與校系整理錄取成果，提供清晰、可閱讀的榜單呈現。">

    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/college.css" />
  </head>

  <body>
    <div id="site-header"></div>

    <main class="container admissions">
      <section class="adm-hero">
        <div class="adm-hero__content">
          <h1 class="adm-hero__title">Class of 2026<br><span class="adm-accent">Dream Big, Reach Higher</span></h1>
          <div class="adm-stats-row">
            <div class="stat-item"><strong>120+</strong><span>Offers</span></div>
            <div class="stat-item"><strong>$2M+</strong><span>Scholarships</span></div>
            <div class="stat-item"><strong>15+</strong><span>Top 30 Unis</span></div>
          </div>
        </div>
      </section>
    
      <nav class="adm-nav" aria-label="Region Switcher">
        <button class="nav-btn active">全部結果</button>
        <button class="nav-btn">美國申請</button>
        <button class="nav-btn">英國/歐洲</button>
        <button class="nav-btn">亞洲地區</button>
      </nav>
    
      <section class="adm-grid">
        <article class="adm-card featured">
          <div class="adm-card__header">
            <div class="student-info">
              <span class="student-name">Hsien-Jue C.</span>
              <span class="student-tag">NTHU · EECS</span>
            </div>
            <div class="adm-badge">Fall 2026</div>
          </div>
    
          <div class="adm-result-list">
            <div class="result-item accepted">
              <div class="school-logo">JHU</div>
              <div class="school-detail">
                <h4>Johns Hopkins University</h4>
                <p>Neuroengineering (MS)</p>
              </div>
              <div class="status-tag">Admission</div>
            </div>
    
            <div class="result-item secondary">
              <span class="school-name">Columbia University</span>
              <span class="status-dot"></span>
            </div>
            <div class="result-item secondary">
              <span class="school-name">UPenn</span>
              <span class="status-dot"></span>
            </div>
          </div>
    
          <div class="adm-card__footer">
            <span class="proof-link">View Verification</span>
          </div>
        </article>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="/js/main.js"></script>
  </body>
</html>
